<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Clone</title>
    <link rel="icon" href="netflix.png">
    <link rel="stylesheet" href="style.css">
    
</head>


<body>

    <div class="fundo-filmes">
       <div class="fundo-slideshow">
    <img src="https://revistaanamaria.com.br/wp-content/uploads/2025/12/beijo-explosivo-final-explicado.jpg" class="slide s1">
    <img src="https://cloudfront-us-east-1.images.arcpublishing.com/estadao/ZTPZBOXEMZBGJBSH7TUDSE6MMQ.jpg" class="slide s2">
    <img src="https://cademeuchapeu.com/wp-content/uploads/2025/06/BELEZA-VERDADEIRA.jpg" class="slide s3">
    <img src="https://doramaresenhas.com/wp-content/uploads/2020/02/pousando-no-amor-drama-para-ver-no-netflix.png?w=2000&h=1152&crop=1" class="slide s4">

</div>
    </div>

    <div class="conteudo-site">
        <header class="header-principal">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" alt="Logo Netflix" class="logo">
            <div class="header-botoes">
                <select class="seletor-idioma">
                    <option>Português</option>
                </select>
                <button class="btn-entrar">Entrar</button>
            </div>
        </header>

        <main class="banner-principal">
            <div class="area-texto">
                <h1>Filmes, Séries e muito mais</h1>
                <p>A partir de 20,90. Cancele quando quiser!</p>
                <h3>Quer assistir? Informe seu email para criar ou reiniciar sua assinatura.</h3>
                
                <form class="formulario-email">
                    <input type="email" placeholder="Email" required>
                    <button type="submit" class="btn-vamos">Vamos lá ></button>
                </form>
            </div>
        </main>
    </div>

</body>
</html>
